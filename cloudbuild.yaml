# ============================================================
# ElGringo Cloud Build CI/CD Pipeline
# Triggered on push to master → build image → deploy 4 services
# ============================================================

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.cloud'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elgringo:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elgringo:latest'
      - '.'

  # Step 2: Push image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elgringo'

  # Step 3: Deploy elgringo-pr-bot
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'elgringo-pr-bot'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elgringo:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--command=/bin/sh'
      - '--args=-c,uvicorn products.pr_review_bot.server:app --host 0.0.0.0 --port $$PORT'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=600'
      - '--set-env-vars=AI_PLATFORM_ENV=production'
      - '--set-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,XAI_API_KEY=XAI_API_KEY:latest,GITHUB_APP_ID=GITHUB_APP_ID:latest,GITHUB_PRIVATE_KEY=GITHUB_PRIVATE_KEY:latest,GITHUB_WEBHOOK_SECRET=GITHUB_WEBHOOK_SECRET:latest'
      - '--allow-unauthenticated'
      - '--quiet'

  # Step 4: Deploy elgringo-api
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'elgringo-api'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elgringo:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--command=/bin/sh'
      - '--args=-c,gunicorn servers.api_server:app --bind 0.0.0.0:$$PORT --workers 2 --timeout 600'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--min-instances=0'
      - '--max-instances=20'
      - '--timeout=600'
      - '--set-env-vars=AI_PLATFORM_ENV=production'
      - '--set-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,XAI_API_KEY=XAI_API_KEY:latest'
      - '--allow-unauthenticated'
      - '--quiet'

  # Step 5: Deploy elgringo-chat
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'elgringo-chat'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elgringo:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--command=/bin/sh'
      - '--args=-c,python -m elgringo.chat_ui'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--timeout=600'
      - '--set-env-vars=AI_PLATFORM_ENV=production'
      - '--set-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,XAI_API_KEY=XAI_API_KEY:latest'
      - '--allow-unauthenticated'
      - '--quiet'

  # Step 6: Deploy elgringo-studio
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'elgringo-studio'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elgringo:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--command=/bin/sh'
      - '--args=-c,python -m elgringo.studio_ui'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--timeout=600'
      - '--set-env-vars=AI_PLATFORM_ENV=production'
      - '--set-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,XAI_API_KEY=XAI_API_KEY:latest'
      - '--allow-unauthenticated'
      - '--quiet'

substitutions:
  _REGION: us-central1
  _REPO: elgringo

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elgringo:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elgringo:latest'
