# 🚀 AI Team Platform - Ingress Configuration
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-team-platform-ingress
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: ai-team-platform
    app.kubernetes.io/component: ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Rate limiting
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
spec:
  tls:
  - hosts:
    - ai-platform.your-domain.com
    - www.ai-platform.your-domain.com
    secretName: ai-platform-tls
  rules:
  - host: ai-platform.your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-team-platform-service
            port:
              number: 80
  - host: www.ai-platform.your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-team-platform-service
            port:
              number: 80

---
# Alternative Ingress for different cloud providers
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-team-platform-gcp-ingress
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: ai-team-platform
    app.kubernetes.io/component: gcp-ingress
  annotations:
    kubernetes.io/ingress.global-static-ip-name: "ai-platform-ip"
    networking.gke.io/managed-certificates: "ai-platform-ssl-cert"
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.allow-http: "false"
spec:
  rules:
  - host: ai-platform.your-gcp-domain.com
    http:
      paths:
      - path: /*
        pathType: ImplementationSpecific
        backend:
          service:
            name: ai-team-platform-service
            port:
              number: 80

---
# AWS ALB Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-team-platform-aws-ingress
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: ai-team-platform
    app.kubernetes.io/component: aws-ingress
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:region:account-id:certificate/certificate-id"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
spec:
  rules:
  - host: ai-platform.your-aws-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-team-platform-service
            port:
              number: 80