<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Gringo AI Team — Dashboard</title>
<style>
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-card: #1c2128;
    --bg-card-hover: #22272e;
    --border: #30363d;
    --border-bright: #484f58;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #6e7681;
    --accent: #58a6ff;
    --accent-dim: #1f6feb33;
    --green: #3fb950;
    --green-dim: #23863633;
    --red: #f85149;
    --red-dim: #da363333;
    --orange: #d29922;
    --orange-dim: #bb800926;
    --purple: #bc8cff;
    --purple-dim: #8957e533;
    --cyan: #39d2c0;
    --radius: 8px;
    --radius-lg: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.4), 0 2px 8px rgba(0,0,0,.2);
    --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-sans);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────────────── */
  .header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }

  .header h1 span {
    color: var(--accent);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    font-family: var(--font-mono);
  }

  .badge-healthy {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid var(--green);
  }

  .badge-offline {
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid var(--red);
  }

  .badge .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text-muted);
    font-size: 12px;
    font-family: var(--font-mono);
  }

  .version-tag {
    background: var(--bg-card);
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    font-size: 11px;
  }

  /* ── Layout ─────────────────────────────────────── */
  .dashboard {
    max-width: 1440px;
    margin: 0 auto;
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .section-full { grid-column: 1 / -1; }

  /* ── Cards ──────────────────────────────────────── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    box-shadow: var(--shadow);
    transition: border-color 0.2s;
  }

  .card:hover {
    border-color: var(--border-bright);
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-secondary);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title .icon {
    font-size: 16px;
  }

  .card-error {
    color: var(--text-muted);
    font-size: 13px;
    font-family: var(--font-mono);
    padding: 12px;
    background: var(--red-dim);
    border-radius: var(--radius);
    border: 1px solid var(--red);
  }

  /* ── Agent Cards ────────────────────────────────── */
  .agent-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .agent-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    transition: border-color 0.2s, transform 0.15s;
  }

  .agent-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .agent-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .agent-role {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .agent-model {
    font-size: 11px;
    font-family: var(--font-mono);
    padding: 2px 8px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 8px;
  }

  .model-cloud { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); }
  .model-local { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
  .model-ollama { background: var(--purple-dim); color: var(--purple); border: 1px solid var(--purple); }

  .agent-caps {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .cap-tag {
    font-size: 10px;
    font-family: var(--font-mono);
    padding: 1px 6px;
    background: var(--bg-primary);
    border-radius: 3px;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  /* ── Stats ──────────────────────────────────────── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }

  .stat-box {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    text-align: center;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 700;
    font-family: var(--font-mono);
    color: var(--text-primary);
    line-height: 1.2;
  }

  .stat-value.green { color: var(--green); }
  .stat-value.accent { color: var(--accent); }
  .stat-value.orange { color: var(--orange); }
  .stat-value.purple { color: var(--purple); }
  .stat-value.cyan { color: var(--cyan); }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 4px;
  }

  /* ── Cost Breakdown ─────────────────────────────── */
  .cost-table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 13px;
  }

  .cost-table th {
    text-align: left;
    padding: 8px 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }

  .cost-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-secondary);
  }

  .cost-table tr:last-child td { border-bottom: none; }

  .cost-table tr:hover td {
    background: var(--bg-secondary);
  }

  .cost-bar-cell { width: 40%; }

  .cost-bar-track {
    height: 6px;
    background: var(--bg-primary);
    border-radius: 3px;
    overflow: hidden;
  }

  .cost-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--accent);
    transition: width 0.5s ease;
  }

  /* ── Insights Table ─────────────────────────────── */
  .insights-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }

  .insight-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }

  .insight-agent {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 8px;
    color: var(--text-primary);
  }

  .insight-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 0;
    font-size: 12px;
  }

  .insight-label { color: var(--text-muted); }

  .insight-val {
    font-family: var(--font-mono);
    font-weight: 600;
  }

  /* ── Activity ───────────────────────────────────── */
  .activity-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .activity-item {
    display: grid;
    grid-template-columns: 100px 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 10px 12px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
  }

  .activity-endpoint {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .activity-count {
    font-family: var(--font-mono);
    font-weight: 600;
    color: var(--text-primary);
  }

  .activity-time {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── Loading/Skeleton ───────────────────────────── */
  .skeleton {
    background: linear-gradient(90deg, var(--bg-secondary) 25%, var(--border) 50%, var(--bg-secondary) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: var(--radius);
    height: 60px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── Responsive ─────────────────────────────────── */
  @media (max-width: 768px) {
    .dashboard {
      grid-template-columns: 1fr;
      padding: 12px;
      gap: 14px;
    }
    .header { padding: 12px 16px; }
    .header h1 { font-size: 17px; }
    .agent-grid { grid-template-columns: 1fr 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .activity-item { grid-template-columns: 80px 1fr auto; }
  }

  @media (max-width: 480px) {
    .agent-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ── Header ───────────────────────────────────────────────── -->
<header class="header">
  <div class="header-left">
    <h1><span>El Gringo</span> AI Team</h1>
    <span id="health-badge" class="badge badge-offline">
      <span class="dot"></span>
      connecting...
    </span>
  </div>
  <div class="header-right">
    <span id="agent-count">-- agents</span>
    <span class="version-tag" id="version-tag">v--</span>
    <span id="last-update">--:--:--</span>
  </div>
</header>

<!-- ── Dashboard Grid ───────────────────────────────────────── -->
<main class="dashboard">

  <!-- Agent Status (full width) -->
  <section class="card section-full">
    <div class="card-title"><span class="icon">&#9673;</span> Agent Status</div>
    <div id="agents-container" class="agent-grid">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </section>

  <!-- Cost Tracker -->
  <section class="card">
    <div class="card-title"><span class="icon">&#9638;</span> Cost Tracker</div>
    <div id="costs-stats" class="stats-row" style="margin-bottom:16px;">
      <div class="skeleton" style="height:70px;"></div>
      <div class="skeleton" style="height:70px;"></div>
    </div>
    <div id="costs-table-wrap"></div>
  </section>

  <!-- ROI Dashboard -->
  <section class="card">
    <div class="card-title"><span class="icon">&#9650;</span> ROI Dashboard</div>
    <div id="roi-container">
      <div class="skeleton" style="height:70px;"></div>
    </div>
  </section>

  <!-- Agent Insights (full width) -->
  <section class="card section-full">
    <div class="card-title"><span class="icon">&#9733;</span> Agent Insights</div>
    <div id="insights-container" class="insights-grid">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </section>

  <!-- Recent Activity (full width) -->
  <section class="card section-full">
    <div class="card-title"><span class="icon">&#9656;</span> Recent Activity</div>
    <div id="activity-container" class="activity-list">
      <div class="skeleton" style="height:40px;"></div>
      <div class="skeleton" style="height:40px;"></div>
      <div class="skeleton" style="height:40px;"></div>
    </div>
  </section>

</main>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG — Change this to point at your El Gringo API
// ═══════════════════════════════════════════════════════════════
const BASE_URL = 'http://localhost:8090';
const API_KEY  = '';  // set if auth is enabled, otherwise leave blank
const REFRESH_INTERVAL = 10000;  // ms

// ── Fetch helper ──────────────────────────────────────────────
async function api(path) {
  const headers = { 'Accept': 'application/json' };
  if (API_KEY) headers['Authorization'] = 'Bearer ' + API_KEY;
  const res = await fetch(BASE_URL + path, { headers, signal: AbortSignal.timeout(8000) });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

// ── Formatters ────────────────────────────────────────────────
function usd(n) {
  if (n == null || isNaN(n)) return '$0.00';
  return '$' + Number(n).toFixed(4);
}

function pct(n) {
  if (n == null || isNaN(n)) return '0%';
  return (Number(n) * 100).toFixed(1) + '%';
}

function num(n) {
  if (n == null || isNaN(n)) return '0';
  return Number(n).toLocaleString();
}

function duration(s) {
  if (s == null || isNaN(s)) return '0s';
  if (s < 60) return s.toFixed(1) + 's';
  if (s < 3600) return (s / 60).toFixed(1) + 'm';
  return (s / 3600).toFixed(1) + 'h';
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function modelClass(type) {
  if (!type) return 'model-cloud';
  const t = type.toLowerCase();
  if (t.includes('local') || t.includes('mlx')) return 'model-local';
  if (t.includes('ollama')) return 'model-ollama';
  return 'model-cloud';
}

function errorBox(msg) {
  return `<div class="card-error">${escHtml(msg)}</div>`;
}

// ── Health ────────────────────────────────────────────────────
async function refreshHealth() {
  const badge = document.getElementById('health-badge');
  const countEl = document.getElementById('agent-count');
  const verEl = document.getElementById('version-tag');
  try {
    const d = await api('/v1/health');
    badge.className = 'badge badge-healthy';
    badge.innerHTML = '<span class="dot"></span>healthy';
    countEl.textContent = (d.agents_count || 0) + ' agents';
    verEl.textContent = 'v' + (d.version || '?');
  } catch (e) {
    badge.className = 'badge badge-offline';
    badge.innerHTML = '<span class="dot"></span>offline';
    countEl.textContent = '-- agents';
  }
}

// ── Agents ────────────────────────────────────────────────────
async function refreshAgents() {
  const el = document.getElementById('agents-container');
  try {
    const agents = await api('/v1/agents');
    if (!agents.length) {
      el.innerHTML = errorBox('No agents registered');
      return;
    }
    el.innerHTML = agents.map(a => `
      <div class="agent-card">
        <div class="agent-name">${escHtml(a.name)}</div>
        <div class="agent-role">${escHtml(a.role)}</div>
        <span class="agent-model ${modelClass(a.model_type)}">${escHtml(a.model_type)}</span>
        <div class="agent-caps">
          ${(a.capabilities || []).slice(0, 5).map(c => `<span class="cap-tag">${escHtml(c)}</span>`).join('')}
          ${(a.capabilities || []).length > 5 ? `<span class="cap-tag">+${a.capabilities.length - 5}</span>` : ''}
        </div>
      </div>
    `).join('');
  } catch (e) {
    el.innerHTML = errorBox('Failed to load agents: ' + e.message);
  }
}

// ── Costs ─────────────────────────────────────────────────────
async function refreshCosts() {
  const statsEl = document.getElementById('costs-stats');
  const tableEl = document.getElementById('costs-table-wrap');
  try {
    const d = await api('/v1/costs');
    const stats = d.statistics || {};
    const budget = d.budget || {};
    const perModel = d.per_model || {};

    statsEl.innerHTML = `
      <div class="stat-box">
        <div class="stat-value accent">${usd(stats.total_cost || budget.total_spent || 0)}</div>
        <div class="stat-label">Total Spend</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${num(stats.total_requests || 0)}</div>
        <div class="stat-label">Requests</div>
      </div>
      <div class="stat-box">
        <div class="stat-value green">${usd(stats.avg_cost_per_request || 0)}</div>
        <div class="stat-label">Avg/Request</div>
      </div>
    `;

    // Per-model table
    const models = Object.entries(perModel);
    if (models.length) {
      const maxCost = Math.max(...models.map(([, v]) => (typeof v === 'object' ? v.total_cost || v.cost || 0 : v) || 0), 0.0001);
      tableEl.innerHTML = `
        <table class="cost-table">
          <thead><tr><th>Model</th><th>Cost</th><th>Requests</th><th class="cost-bar-cell">Share</th></tr></thead>
          <tbody>
            ${models.map(([name, val]) => {
              const cost = typeof val === 'object' ? (val.total_cost || val.cost || 0) : val;
              const reqs = typeof val === 'object' ? (val.requests || val.count || '-') : '-';
              const pctW = ((cost / maxCost) * 100).toFixed(1);
              return `<tr>
                <td>${escHtml(name)}</td>
                <td>${usd(cost)}</td>
                <td>${reqs}</td>
                <td class="cost-bar-cell"><div class="cost-bar-track"><div class="cost-bar-fill" style="width:${pctW}%"></div></div></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      `;
    } else {
      tableEl.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">No per-model data yet</div>';
    }
  } catch (e) {
    statsEl.innerHTML = errorBox('Failed to load costs: ' + e.message);
    tableEl.innerHTML = '';
  }
}

// ── ROI ───────────────────────────────────────────────────────
async function refreshROI() {
  const el = document.getElementById('roi-container');
  try {
    const d = await api('/v1/roi');
    // Adapt to whatever shape the API returns
    const timeSaved = d.time_saved_hours || d.time_saved || d.total_time_saved || 0;
    const moneySaved = d.money_saved || d.total_money_saved || d.cost_savings || 0;
    const tasksCompleted = d.tasks_completed || d.total_tasks || d.collaborations || 0;
    const avgQuality = d.avg_quality || d.quality_score || d.average_quality || 0;
    const roi = d.roi_percentage || d.roi || 0;

    el.innerHTML = `
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-value green">${typeof timeSaved === 'number' ? timeSaved.toFixed(1) + 'h' : timeSaved}</div>
          <div class="stat-label">Time Saved</div>
        </div>
        <div class="stat-box">
          <div class="stat-value accent">${usd(moneySaved)}</div>
          <div class="stat-label">Money Saved</div>
        </div>
        <div class="stat-box">
          <div class="stat-value purple">${num(tasksCompleted)}</div>
          <div class="stat-label">Tasks</div>
        </div>
        <div class="stat-box">
          <div class="stat-value cyan">${typeof avgQuality === 'number' && avgQuality <= 1 ? pct(avgQuality) : avgQuality}</div>
          <div class="stat-label">Quality</div>
        </div>
        <div class="stat-box">
          <div class="stat-value orange">${typeof roi === 'number' ? roi.toFixed(0) + '%' : roi}</div>
          <div class="stat-label">ROI</div>
        </div>
      </div>
    `;
  } catch (e) {
    el.innerHTML = errorBox('ROI data unavailable: ' + e.message);
  }
}

// ── Agent Insights ────────────────────────────────────────────
async function refreshInsights() {
  const el = document.getElementById('insights-container');
  try {
    const d = await api('/v1/agent-insights');
    const profiles = d.profiles || {};
    const entries = Object.entries(profiles);

    if (!entries.length) {
      el.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">No feedback data yet. Use POST /v1/feedback to record outcomes.</div>';
      return;
    }

    el.innerHTML = entries.map(([agent, p]) => {
      const sat = p.satisfaction_rate || p.satisfaction || 0;
      const score = p.avg_score || p.score || p.task_score || 0;
      const tasks = p.total_tasks || p.tasks || p.count || 0;
      const strength = p.top_strength || p.specialization || p.best_at || '--';

      const satColor = sat >= 0.8 ? 'var(--green)' : sat >= 0.5 ? 'var(--orange)' : 'var(--red)';
      const scoreColor = score >= 0.8 ? 'var(--green)' : score >= 0.5 ? 'var(--orange)' : 'var(--red)';

      return `
        <div class="insight-card">
          <div class="insight-agent">${escHtml(agent)}</div>
          <div class="insight-row">
            <span class="insight-label">Satisfaction</span>
            <span class="insight-val" style="color:${satColor}">${pct(sat)}</span>
          </div>
          <div class="insight-row">
            <span class="insight-label">Task Score</span>
            <span class="insight-val" style="color:${scoreColor}">${typeof score === 'number' && score <= 1 ? pct(score) : score}</span>
          </div>
          <div class="insight-row">
            <span class="insight-label">Tasks</span>
            <span class="insight-val" style="color:var(--text-primary)">${num(tasks)}</span>
          </div>
          <div class="insight-row">
            <span class="insight-label">Strength</span>
            <span class="insight-val" style="color:var(--purple);font-size:11px;">${escHtml(String(strength))}</span>
          </div>
        </div>
      `;
    }).join('');
  } catch (e) {
    el.innerHTML = errorBox('Insights unavailable: ' + e.message);
  }
}

// ── Recent Activity ───────────────────────────────────────────
async function refreshActivity() {
  const el = document.getElementById('activity-container');
  try {
    // Use analytics summary which is always available
    const d = await api('/api/usage/endpoints');
    const data = d.data || d;

    let entries;
    if (Array.isArray(data)) {
      entries = data;
    } else if (typeof data === 'object') {
      entries = Object.entries(data).map(([endpoint, stats]) => ({
        endpoint,
        ...(typeof stats === 'object' ? stats : { count: stats }),
      }));
    } else {
      entries = [];
    }

    // Sort by request count desc, take top 10
    entries.sort((a, b) => (b.count || b.total || 0) - (a.count || a.total || 0));
    entries = entries.slice(0, 10);

    if (!entries.length) {
      el.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">No activity recorded yet.</div>';
      return;
    }

    el.innerHTML = entries.map(e => {
      const endpoint = e.endpoint || e.path || '??';
      const count = e.count || e.total || 0;
      const avgTime = e.avg_response_time || e.avg_time || e.avg_ms || null;
      return `
        <div class="activity-item">
          <span class="activity-count">${num(count)} calls</span>
          <span class="activity-endpoint">${escHtml(endpoint)}</span>
          <span class="activity-time">${avgTime != null ? duration(avgTime / 1000) + ' avg' : ''}</span>
        </div>
      `;
    }).join('');
  } catch (e) {
    el.innerHTML = errorBox('Activity data unavailable: ' + e.message);
  }
}

// ── Refresh orchestrator ──────────────────────────────────────
async function refreshAll() {
  const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
  document.getElementById('last-update').textContent = ts;

  await Promise.allSettled([
    refreshHealth(),
    refreshAgents(),
    refreshCosts(),
    refreshROI(),
    refreshInsights(),
    refreshActivity(),
  ]);
}

// ── Boot ──────────────────────────────────────────────────────
refreshAll();
setInterval(refreshAll, REFRESH_INTERVAL);
</script>
