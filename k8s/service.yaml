# 🚀 AI Team Platform - Services
apiVersion: v1
kind: Service
metadata:
  name: ai-team-platform-service
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: ai-team-platform
    app.kubernetes.io/component: service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/azure-load-balancer-resource-group: "ai-platform-rg"
    cloud.google.com/load-balancer-type: "External"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: ai-team-platform
    app.kubernetes.io/component: application
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: https
    port: 443
    targetPort: http
    protocol: TCP
  sessionAffinity: None

---
# ClusterIP service for internal communication
apiVersion: v1
kind: Service
metadata:
  name: ai-team-platform-internal
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: ai-team-platform
    app.kubernetes.io/component: internal-service
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ai-team-platform
    app.kubernetes.io/component: application
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP

---
# Headless service for StatefulSet (if needed)
apiVersion: v1
kind: Service
metadata:
  name: ai-team-platform-headless
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: ai-team-platform
    app.kubernetes.io/component: headless-service
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: ai-team-platform
    app.kubernetes.io/component: application
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP