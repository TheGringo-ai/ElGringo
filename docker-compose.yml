# AI TEAM PLATFORM - Docker Compose (Slim)
# For personal development use
#
# Usage:
#   docker-compose up              # Just the AI platform
#   docker-compose --profile db up # With PostgreSQL + Redis
#   docker-compose --profile full up # Everything (monitoring, etc.)

version: '3.8'

services:
  # =============================================================================
  # AI Team Platform - Main Application
  # =============================================================================
  ai-platform:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    ports:
      - "8080:8080"
    environment:
      - AI_PLATFORM_ENV=development
      - LOG_LEVEL=info
      - CORS_ORIGINS=*
      - SECRET_KEY=dev-secret-key
      # Database URLs (only if using db profile)
      - DATABASE_URL=postgresql://aiplatform:aiplatform@postgres:5432/aiplatform_db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
      - ./logs:/app/logs
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 60s
      timeout: 10s
      retries: 3

  # =============================================================================
  # Database Services (Optional - use with: --profile db)
  # =============================================================================
  postgres:
    image: postgres:15-alpine
    profiles: ["db", "full"]
    environment:
      - POSTGRES_DB=aiplatform_db
      - POSTGRES_USER=aiplatform
      - POSTGRES_PASSWORD=aiplatform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles: ["db", "full"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-network
    restart: unless-stopped

  # =============================================================================
  # Dev Tools (Optional - use with: --profile tools)
  # =============================================================================
  adminer:
    image: adminer:latest
    profiles: ["tools", "full"]
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      - postgres
    networks:
      - ai-network

  # =============================================================================
  # Monitoring (Optional - use with: --profile full)
  # =============================================================================
  prometheus:
    image: prom/prometheus:latest
    profiles: ["full"]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - ai-network

  grafana:
    image: grafana/grafana:latest
    profiles: ["full"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
