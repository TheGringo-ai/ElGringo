# 🚀 AI Team Platform - Production Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-team-platform
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: ai-team-platform
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: ai-platform
  annotations:
    description: "AI Team Platform - Ultimate Application Generator"
    ai.platform.value: "$250M+"
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-team-platform
      app.kubernetes.io/component: application
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-team-platform
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: application
        app.kubernetes.io/part-of: ai-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ai-platform-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: ai-platform
        image: ai-team-platform:1.0.0
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        # Configuration from ConfigMap
        - name: AI_PLATFORM_ENV
          valueFrom:
            configMapKeyRef:
              name: ai-platform-config
              key: AI_PLATFORM_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: ai-platform-config
              key: PORT
        - name: HOST
          valueFrom:
            configMapKeyRef:
              name: ai-platform-config
              key: HOST
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: ai-platform-config
              key: LOG_LEVEL
        - name: WORKERS
          valueFrom:
            configMapKeyRef:
              name: ai-platform-config
              key: WORKERS
        # Secrets
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: ai-platform-secrets
              key: SECRET_KEY
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ai-platform-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: ai-platform-secrets
              key: REDIS_URL
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-platform-secrets
              key: OPENAI_API_KEY
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-platform-secrets
              key: ANTHROPIC_API_KEY
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-platform-secrets
              key: GOOGLE_API_KEY
        
        # Resource limits and requests
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
            ephemeral-storage: "1Gi"
          limits:
            memory: "2Gi"
            cpu: "2000m"
            ephemeral-storage: "2Gi"
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          timeoutSeconds: 10
          periodSeconds: 30
          failureThreshold: 3
          successThreshold: 1
        
        readinessProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 3
          successThreshold: 1
        
        # Startup probe for slow starting containers
        startupProbe:
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          timeoutSeconds: 10
          periodSeconds: 10
          failureThreshold: 30
          successThreshold: 1
        
        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities:
            drop:
            - ALL
        
        # Volume mounts
        volumeMounts:
        - name: app-logs
          mountPath: /app/logs
        - name: app-data
          mountPath: /app/data
        - name: tmp-volume
          mountPath: /tmp
      
      # Volumes
      volumes:
      - name: app-logs
        emptyDir: {}
      - name: app-data
        emptyDir: {}
      - name: tmp-volume
        emptyDir: {}
      
      # Pod anti-affinity to spread pods across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - ai-team-platform
              topologyKey: kubernetes.io/hostname
      
      # Tolerations for node taints
      tolerations:
      - key: "ai-platform"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      
      # DNS policy
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      
      # Termination grace period
      terminationGracePeriodSeconds: 30