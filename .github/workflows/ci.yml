name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/ -x -q

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Package code
        run: |
          tar -czf /tmp/fredai.tar.gz \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='venv' \
            --exclude='tests' \
            --exclude='terraform' \
            --exclude='k8s' \
            --exclude='mlx-training' \
            --exclude='.pytest_cache' \
            --exclude='.ruff_cache' \
            --exclude='*.egg-info' \
            --exclude='dist' \
            --exclude='build' \
            --exclude='htmlcov' \
            --exclude='.coverage' \
            .
          echo "Package size: $(du -h /tmp/fredai.tar.gz | cut -f1)"

      - name: Upload to VM
        run: |
          gcloud compute scp /tmp/fredai.tar.gz ci-deploy-fredai.sh \
            "${{ secrets.VM_NAME }}:/tmp/" \
            --zone="${{ secrets.VM_ZONE }}" --quiet

      - name: Deploy on VM
        run: |
          gcloud compute ssh "${{ secrets.VM_NAME }}" \
            --zone="${{ secrets.VM_ZONE }}" --quiet \
            --command="sudo bash /tmp/ci-deploy-fredai.sh"

      - name: Health check
        run: |
          echo "Waiting 15s for services to start..."
          sleep 15

          API_STATUS=$(gcloud compute ssh "${{ secrets.VM_NAME }}" \
            --zone="${{ secrets.VM_ZONE }}" --quiet \
            --command="curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:5050/api/health" 2>/dev/null || echo "000")
          echo "API Server (5050): HTTP ${API_STATUS}"

          BOT_STATUS=$(gcloud compute ssh "${{ secrets.VM_NAME }}" \
            --zone="${{ secrets.VM_ZONE }}" --quiet \
            --command="curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8001/health" 2>/dev/null || echo "000")
          echo "PR Bot (8001): HTTP ${BOT_STATUS}"

          if [ "$API_STATUS" != "200" ]; then
            echo "::error::API health check failed with HTTP ${API_STATUS}"
            exit 1
          fi
          echo "Health checks passed"
