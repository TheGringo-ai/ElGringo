  ai_repo_review:
    name: AI Repo Review
    status: ready
    location: /Users/fredtaylor/Development/Projects/ai-repo-review/
    intention: >
      Static analysis tool for Python repositories. Detects security issues,
      code quality problems, and deprecated patterns without executing code.
      Used to audit all Fred ecosystem projects.
    tech_stack:
      core: Python, static analysis only
    features:
      - Security detection (hardcoded secrets, API keys, eval/exec, pickle)
      - Code quality analysis (bare excepts, deprecated patterns, missing type hints)
      - Dependency vulnerability scanning
      - No code execution — pure static analysis
      - No external calls — fully local
      - No data retention — reports only
    principles:
      - Never execute analyzed code
      - Never make external calls during analysis
      - Report findings for human review only — no auto-fixes
      - False positive rate matters — precision over recall
