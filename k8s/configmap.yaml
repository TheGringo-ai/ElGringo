# 🚀 AI Team Platform - Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-platform-config
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: ai-team-platform
    app.kubernetes.io/component: config
data:
  AI_PLATFORM_ENV: "production"
  PORT: "8080"
  HOST: "0.0.0.0"
  LOG_LEVEL: "info"
  WORKERS: "4"
  WORKER_CLASS: "uvicorn.workers.UvicornWorker"
  CORS_ORIGINS: "*"
  # AI Model Configuration
  CLAUDE_MODEL: "claude-sonnet-4"
  CHATGPT_MODEL: "chatgpt-4"
  GEMINI_MODEL: "gemini-2.5-flash"
  GROK_MODEL: "grok-3"
  # Platform Settings
  MAX_INSTANCES: "100"
  TIMEOUT: "3600"
  MEMORY_LIMIT: "2Gi"
  CPU_LIMIT: "2000m"