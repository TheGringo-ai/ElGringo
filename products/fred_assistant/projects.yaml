# El Gringo Ecosystem — Project Manifest
# Indexed into RAG on startup so the AI team stays on task.
# Update this file when projects change scope, features, or status.

projects:

  chatterfix:
    name: ChatterFix CMMS
    status: production
    domain: https://chatterfix.com
    repo: https://github.com/TheGringo-ai/Chatterfix
    location: /Users/fredtaylor/Development/Projects/ChatterFix/
    vm: Google Cloud Run
    intention: >
      AI-powered maintenance management system built for field technicians, not office workers.
      Hands-free operation through voice commands, OCR scanning, and natural language AI.
      The flagship product of the El Gringo ecosystem.
    tech_stack:
      backend: Python 3.11+, FastAPI, Firestore, Cloud Run
      frontend: React Native mobile, Jinja2 web templates
      ai: Google Gemini, multi-model orchestration
      auth: Firebase Auth
      storage: Google Cloud Storage, Firestore (42+ collections)
    features:
      - Voice command work order creation (hands-free for technicians)
      - OCR-powered document scanning
      - AI-assisted maintenance diagnosis and insights
      - Multi-tenant organization isolation
      - Training module system for technician onboarding
      - Real-time notifications and alerts
      - Asset management with QR code support
      - Parts inventory and vendor management
      - Work order lifecycle (create, assign, complete, audit)
      - Preventive maintenance scheduling
    roadmap:
      - AR-guided repair instructions
      - Predictive maintenance via IoT sensor data
      - Voice-to-work-order pipeline improvements
      - Mobile offline mode with sync
    principles:
      - Technician-first, not manager-first
      - Hands-free is the default interaction mode
      - Safety-aware — professional tone in all outputs
      - Multi-tenant isolation is non-negotiable

  managers_dashboard:
    name: Managers Dashboard
    status: production
    domain: https://dashboard.chatterfix.com
    repo: https://github.com/TheGringo-ai/ManagersDashboard
    location: /Users/fredtaylor/Development/Projects/work/managers-dashboard/
    vm: 136.113.48.166 (e2-medium)
    intention: >
      Multi-tenant CMMS analytics and auditing dashboard for maintenance managers.
      Provides KPI tracking, equipment health scoring, technician performance,
      and AI-powered audit reporting. The analytics brain of ChatterFix.
    tech_stack:
      backend: Python 3.11+, FastAPI (21 routers, 70+ endpoints)
      frontend: React 18, Vite, Tailwind CSS (30+ tabs)
      ai: OpenAI GPT-4, Gemini, Groq for audit analysis
      auth: Firebase Auth + PIN login
      storage: Firestore, Google Cloud Storage
      cicd: GitHub Actions → SCP → systemd
    features:
      - Dashboard analytics with KPI tracking and trend analysis
      - 5-factor equipment health scoring (repairs, overdue, backlog, cost, workload)
      - Technician performance metrics and team comparisons
      - Automated CMMS compliance auditing vs industry benchmarks
      - AI-generated PDF audit reports with charts
      - Multi-tenant per-client data isolation
      - Role-based access (super_admin, admin, manager, viewer)
      - Client portal for self-service non-admin users
      - Real-time notifications (overdue, PM reminders, audit alerts)
      - AI chat sidebar for natural language data queries
      - Work order cost analysis and budgeting
      - Preventive maintenance schedule generation
    roadmap:
      - Dynamic dashboard builder (drag-and-drop widgets)
      - Intelligent alerts with ML anomaly detection
      - Cross-client benchmarking reports
      - Mobile-responsive redesign
    principles:
      - This is NOT ChatterFix — separate product, separate codebase
      - clientApi paths never include /api/ prefix (interceptors add it)
      - PIN auth uses bcrypt hashing (DASHBOARD_PIN_HASH env var)
      - Dark mode must always be tested before deploy

  elgringo:
    name: El Gringo Platform
    status: production
    domain: https://ai.chatterfix.com
    repo: https://github.com/TheGringo-ai/ElGringo
    location: /Users/fredtaylor/Development/Projects/ElGringo/
    vm: 34.61.174.254 (elgringo-vm, e2-medium, Debian 12)
    intention: >
      Advanced multi-agent AI orchestration platform. The brain of the entire ecosystem.
      Coordinates ChatGPT, Gemini, Grok, Claude, and local models. Routes tasks to
      optimal models, runs analysis in parallel, synthesizes responses, and learns from
      every interaction to prevent repeated mistakes.
    tech_stack:
      backend: Python 3.9+, AutoGen framework (enhanced)
      models: OpenAI GPT-4, Gemini 2.5 Flash, Grok 3, Claude, Ollama, LlamaCloud
      infrastructure: Firestore for memory, Redis for caching
      interfaces: CLI, REST API, MCP Server (28 tools), Gradio UI
      learning: Tiered memory (hot/warm/cold), mistake prevention, solution patterns
    features:
      - 8 collaboration modes (parallel, consensus, debate, peer review, brainstorm, etc.)
      - Intelligent model routing based on task type, complexity, and cost
      - Weighted response synthesis using confidence scores
      - Fred Assistant — local AI personal assistant (tasks, memory, boards, calendar, CRM)
      - GitHub PR review bot with multi-agent structured output
      - Code audit service (security scanning)
      - Test generation service
      - Documentation generation service
      - FredFix security scanner with auto-fix
      - 28 MCP tools for Claude Code integration
      - Tiered memory with TF-IDF search and auto-deduplication
      - Code RAG for codebase-aware retrieval
      - 12 services running on dedicated VM
    roadmap:
      - Local RAG with ChromaDB for semantic context (IN PROGRESS)
      - Agent-to-agent delegation (Fred dispatches to specialists)
      - Cost optimization dashboard
      - Multi-project memory sharing
    principles:
      - Fred Assistant is the central hub connecting all services
      - Every mistake must be logged and prevented from recurring
      - All AI responses go through quality scoring
      - Platform services communicate via localhost HTTP

